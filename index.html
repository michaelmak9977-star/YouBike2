<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoBike Insight — 採集狀況儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    header h1 span { color: #2ecc71; }
    #last-update { font-size: 0.8rem; color: #888; }
    #countdown {
      font-size: 0.85rem;
      color: #aaa;
      background: #1e2130;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* 指標卡 */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: #1e2130;
      border-radius: 12px;
      padding: 18px 20px;
      border: 1px solid #2a2d3e;
    }
    .card .label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
    .card .value { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .card .value.green  { color: #2ecc71; }
    .card .value.blue   { color: #3498db; }
    .card .value.yellow { color: #f1c40f; }

    /* 圖表區 */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .charts-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-box {
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #2a2d3e;
    }
    .chart-box h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 14px;
    }
    canvas { width: 100% !important; }

    /* 警示表 */
    .warning-box {
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #2a2d3e;
    }
    .warning-box h2 { font-size: 0.95rem; font-weight: 600; color: #ccc; margin-bottom: 14px; }
    .badge-ok  { display:inline-block; background:#1a4731; color:#2ecc71; padding:4px 12px; border-radius:20px; font-size:0.85rem; }
    .badge-warn{ display:inline-block; background:#4a2c00; color:#f39c12; padding:4px 12px; border-radius:20px; font-size:0.85rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
    th { text-align: left; color: #888; font-weight: 500; padding: 6px 10px; border-bottom: 1px solid #2a2d3e; }
    td { padding: 8px 10px; border-bottom: 1px solid #1a1d2b; }
    tr:last-child td { border-bottom: none; }
    td.zero { color: #e74c3c; font-weight: 700; }
    td.low  { color: #f39c12; font-weight: 600; }

    @media (max-width: 768px) {
      .charts-row, .charts-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>🚲 EcoBike <span>Insight</span> — 採集狀況儀表板</h1>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <span id="last-update">載入中…</span>
    <span id="countdown">下次刷新：60s</span>
  </div>
</header>

<!-- 指標卡 -->
<div class="metrics">
  <div class="card">
    <div class="label">最新採集時間</div>
    <div class="value" id="m-time" style="font-size:1.1rem;">—</div>
  </div>
  <div class="card">
    <div class="label">下次採集時間（預估）</div>
    <div class="value yellow" id="m-next" style="font-size:1.1rem;">—</div>
  </div>
  <div class="card">
    <div class="label">累積採集次數</div>
    <div class="value" id="m-snapshots">—</div>
  </div>
  <div class="card">
    <div class="label">監控站點數</div>
    <div class="value" id="m-stations">—</div>
  </div>
  <div class="card">
    <div class="label">全市可借車輛</div>
    <div class="value green" id="m-bikes">—</div>
  </div>
  <div class="card">
    <div class="label">全市可還空柱</div>
    <div class="value blue" id="m-docks">—</div>
  </div>
</div>

<!-- 趨勢圖 + 行政區 -->
<div class="charts-row">
  <div class="chart-box">
    <h2>全市可借車輛 &amp; 可還空柱趨勢</h2>
    <canvas id="chart-trend" height="200"></canvas>
  </div>
  <div class="chart-box">
    <h2>各行政區平均可借車輛（最新）</h2>
    <canvas id="chart-district" height="200"></canvas>
  </div>
</div>

<!-- 分布圖 + 採集紀錄 -->
<div class="charts-row-2">
  <div class="chart-box">
    <h2>可借車輛分布（最新快照）</h2>
    <canvas id="chart-dist" height="200"></canvas>
  </div>
  <div class="chart-box">
    <h2>採集紀錄</h2>
    <div id="snapshot-table" style="overflow-x:auto;"></div>
  </div>
</div>

<!-- 警示 -->
<div class="warning-box">
  <h2>可借車輛不足警示（可借 &lt; 3 台）</h2>
  <div id="warning-content">載入中…</div>
</div>

<script>
  const COLLECTION_BUFFER_SEC = 10;  // 採集完成後等待 data.js 寫入的緩衝秒數

  let trendChart, districtChart, distChart;
  let countdown = 0;
  let refreshTimer = null;

  // 計算距離下一個 GitHub Actions cron 執行時間的秒數
  // cron: */5 * * * * (UTC) → 每個 UTC 5 分鐘整點執行
  // 直接用 JS 計算，不依賴 data.js 中的 next_run_time（避免已過期的問題）
  function calcSecondsUntilRefresh() {
    const nowUtc = new Date();
    const minUtc = nowUtc.getUTCMinutes();
    const secUtc = nowUtc.getUTCSeconds();
    // 距離下一個 5 分鐘整點的秒數
    const secsToNextMark = (5 - (minUtc % 5)) * 60 - secUtc;
    return secsToNextMark + COLLECTION_BUFFER_SEC;
  }

  // 啟動對齊排程的倒數計時
  function startCountdown(seconds) {
    if (refreshTimer) clearInterval(refreshTimer);
    countdown = seconds;
    document.getElementById("countdown").textContent = `下次刷新：${countdown}s`;
    refreshTimer = setInterval(() => {
      countdown--;
      document.getElementById("countdown").textContent = `下次刷新：${countdown}s`;
      if (countdown <= 0) {
        clearInterval(refreshTimer);
        loadData();
      }
    }, 1000);
  }

  function fmt(n) { return Number(n).toLocaleString(); }

  // 動態重新載入 data.js（加 cache-busting 強制瀏覽器從磁碟讀取最新版本）
  function reloadDataJs() {
    return new Promise((resolve) => {
      const old = document.querySelector('script[data-ecobike]');
      if (old) old.remove();
      const s = document.createElement('script');
      s.src = 'data/data.js?t=' + Date.now();
      s.setAttribute('data-ecobike', '1');
      s.onload = resolve;
      s.onerror = resolve;  // 失敗也繼續，避免卡住
      document.head.appendChild(s);
    });
  }

  async function loadData() {
    let d = null;

    // 每次都重新載入 data.js，確保取得最新採集資料
    await reloadDataJs();

    if (window.ECOBIKE_DATA) {
      d = window.ECOBIKE_DATA;
    } else {
      // fallback：透過 HTTP 伺服器的 fetch 模式
      try {
        const res = await fetch("data/latest.json?t=" + Date.now());
        if (!res.ok) throw new Error("HTTP " + res.status);
        d = await res.json();
      } catch (e) {
        document.getElementById("last-update").textContent = "⚠ 無法載入資料，請確認 data/data.js 存在";
        return;
      }
    }

    renderMetrics(d);
    renderTrend(d.trend);
    renderDistrict(d.district);
    renderDist(d.distribution);
    renderSnapshotTable(d.trend);
    renderWarning(d.warnings);
    document.getElementById("last-update").textContent = `資料更新：${d.generated_at}`;

    // 計算距離下一個 cron 整點的秒數，確保頁面刷新時間緊接在採集完成之後
    startCountdown(calcSecondsUntilRefresh());
  }

  function renderMetrics(d) {
    document.getElementById("m-time").textContent      = d.latest_fetched_at.slice(11) || "—";
    document.getElementById("m-next").textContent      = d.next_run_time ? d.next_run_time.slice(11) : "—";
    document.getElementById("m-snapshots").textContent = d.total_snapshots + " 次";
    document.getElementById("m-stations").textContent  = fmt(d.total_stations) + " 站";
    document.getElementById("m-bikes").textContent     = fmt(d.total_available_bikes) + " 台";
    document.getElementById("m-docks").textContent     = fmt(d.total_empty_docks) + " 格";
  }

  function renderTrend(trend) {
    const labels = trend.map(r => r.fetched_at.slice(5));  // MM-DD HH:MM
    const bikes  = trend.map(r => r.available_bikes);
    const docks  = trend.map(r => r.empty_docks);
    const ctx = document.getElementById("chart-trend").getContext("2d");
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "可借車輛", data: bikes, borderColor: "#2ecc71", backgroundColor: "rgba(46,204,113,0.1)", tension: 0.3, fill: true, pointRadius: 5 },
          { label: "可還空柱", data: docks, borderColor: "#3498db", backgroundColor: "rgba(52,152,219,0.1)", tension: 0.3, fill: true, pointRadius: 5 },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#ccc" } } },
        scales: {
          x: { ticks: { color: "#888" }, grid: { color: "#2a2d3e" } },
          y: { ticks: { color: "#888" }, grid: { color: "#2a2d3e" } },
        },
      },
    });
  }

  function renderDistrict(district) {
    const labels = district.map(r => r.district);
    const values = district.map(r => r.available_bikes);
    const ctx = document.getElementById("chart-district").getContext("2d");
    if (districtChart) districtChart.destroy();
    districtChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{ label: "平均可借車輛", data: values, backgroundColor: "#2ecc71aa", borderColor: "#2ecc71", borderWidth: 1 }],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#888" }, grid: { color: "#2a2d3e" } },
          y: { ticks: { color: "#ccc", font: { size: 11 } }, grid: { color: "#2a2d3e" } },
        },
      },
    });
  }

  function renderDist(distribution) {
    const labels = distribution.map(r => r.label);
    const values = distribution.map(r => r.count);
    const colors = ["#e74c3c", "#e67e22", "#f1c40f", "#2ecc71", "#27ae60"];
    const ctx = document.getElementById("chart-dist").getContext("2d");
    if (distChart) distChart.destroy();
    distChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{ label: "站點數", data: values, backgroundColor: colors }],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#ccc", font: { size: 11 } }, grid: { color: "#2a2d3e" } },
          y: { ticks: { color: "#888" }, grid: { color: "#2a2d3e" } },
        },
      },
    });
  }

  function renderSnapshotTable(trend) {
    if (!trend.length) { document.getElementById("snapshot-table").innerHTML = "<p style='color:#888;font-size:0.85rem'>尚無採集紀錄</p>"; return; }
    const rows = [...trend].reverse().map(r => `
      <tr>
        <td>${r.fetched_at}</td>
        <td style="color:#2ecc71">${fmt(r.available_bikes)}</td>
        <td style="color:#3498db">${fmt(r.empty_docks)}</td>
      </tr>`).join("");
    document.getElementById("snapshot-table").innerHTML = `
      <table>
        <thead><tr><th>採集時間</th><th>可借</th><th>可還</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderWarning(warnings) {
    const el = document.getElementById("warning-content");
    if (!warnings.length) {
      el.innerHTML = '<span class="badge-ok">目前無可借車輛不足的站點</span>';
      return;
    }
    const rows = warnings.map(w => `
      <tr>
        <td>${w.station_name.replace("YouBike2.0_", "")}</td>
        <td>${w.district}</td>
        <td class="${w.available_bikes === 0 ? 'zero' : 'low'}">${w.available_bikes}</td>
        <td>${w.empty_docks}</td>
        <td>${w.total_docks}</td>
      </tr>`).join("");
    el.innerHTML = `
      <span class="badge-warn">共 ${warnings.length} 個站點可借車輛不足 3 台</span>
      <table style="margin-top:12px">
        <thead><tr><th>站點名稱</th><th>行政區</th><th>可借</th><th>可還</th><th>總柱</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // 不在此處直接呼叫 loadData()
  // 統一由下方 data.js 載入完成後觸發，避免 file:// 環境的非同步競爭問題
</script>

<!-- data.js 由採集器每次更新，內嵌最新資料供 file:// 直接開啟使用 -->
<script src="data/data.js"></script>
<script>
  // data.js 載入後呼叫（file:// 環境走此路徑）
  // 若 data.js 不存在（純 HTTP 伺服器環境），則改用 fetch
  loadData();
</script>
</body>
</html>
