name: YouBike 資料採集

on:
  schedule:
    # 每 5 分鐘執行一次（GitHub Actions 最小間隔限制）
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 允許手動觸發（測試用）

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許 commit 回 repo

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安裝 uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: 安裝套件
        run: uv sync

      - name: 執行資料採集
        run: uv run python src/collector_once.py

      - name: 提交並推送更新資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.js data/latest.json
          # 若資料有變動才 commit（避免空 commit）
          if git diff --staged --quiet; then
            echo "資料無變動，略過 commit"
          else
            git commit -m "chore: 自動更新 YouBike 採集資料 $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
